# Power-Flow 全局配置（当前使用扁平 YAML 格式）
data_file: data/118ieee.txt
base_mva: 100.0
algorithm: nr
tolerance: 1e-6
max_iterations: 20
# NR、快速解耦、最优乘子和非线性规划法的公平对比设置
# 每种算法总运行次数；第 1 次预热，其余样本按单侧 IQR 规则识别异常值
comparison_repeat_count: 11
comparison_all_cases: true
# 批量计算时只为该节点系统保留单独三联图
comparison_detail_case: 118
comparison_flat_start: true
comparison_fast_decoupled_max_iterations: 100
# 仅对详细算例执行不同收敛精度扫描；运行顺序为从宽松到严格
comparison_run_tolerance_sweep: true
comparison_tolerance_values: 1e-4, 1e-6, 1e-8, 1e-10
# 每个精度运行 31 次：第 1 次预热，后 30 次进入统计
comparison_tolerance_repeat_count: 31
# 118 节点详细算例鲁棒性测试
comparison_run_robustness: true
robustness_random_trials: 20
# 每一级电压扰动与相角扰动按相同位置配对
robustness_voltage_perturbations: 0.02, 0.05, 0.10
robustness_angle_perturbations_deg: 2, 5, 10
# CPF 得到的 118 节点最大稳定负荷倍率约为 1.6074，仅在鼻点附近测试
robustness_load_multipliers: 1.60, 1.605, 1.6074, 1.61, 1.615
# NR 与快速解耦法分别二分细化收敛边界
robustness_load_refinement_tolerance: 1e-5
robustness_resistance_multipliers: 1.0, 2.0, 3.0
robustness_random_seed: 2026
# 全部 IEEE 算例的规模增长趋势；拟合时忽略小于 30 节点的固定开销区
comparison_run_scaling_analysis: true
comparison_scaling_min_nodes: 30
# 最优乘子法与非线性规划法在 CPF 鼻点前后的停滞诊断
comparison_run_critical_stagnation: true
critical_stagnation_cpf_nose_multiplier: 1.6074
critical_stagnation_load_multipliers: 1.600, 1.605, 1.6074, 1.610, 1.612, 1.613, 1.614, 1.615, 1.617, 1.620
critical_stagnation_max_iterations: 60
critical_stagnation_enforce_q_limits: true
plot_dir: output/plots

# CPF 前的统一负荷倍率扫描
run_loadability_scan: true
load_multiplier_start: 1.0
load_multiplier_stop: 3.0
load_multiplier_step: 0.01
load_refinement_tolerance: 1e-4
load_scan_max_iterations: 50

# 连续潮流计算
run_cpf: true
# 可选 natural、pseudo_arclength、tangent_angle、absolute_vp_angle
cpf_parameterization: tangent_angle
cpf_lambda_init: 0.0
cpf_lambda_min: -0.99
cpf_lambda_max: 2.0
cpf_step_size: 0.01
cpf_min_step: 1e-4
cpf_max_step: 0.05
cpf_step_increase_factor: 1.25
cpf_step_decrease_factor: 0.5
cpf_fast_convergence_iters: 4
cpf_slow_convergence_iters: 15
cpf_max_step_retries: 8
cpf_corrector_tolerance: 1e-8
cpf_max_corrector_iterations: 15
cpf_max_steps: 500
cpf_post_nose_steps: 20
cpf_initial_direction: 1
# 是否在发电机无功越限后将 PV 母线单向转换为 PQ
cpf_enforce_q_limits: true
# P–V 切线角监测母线；0 表示自动选择电压最敏感的 PQ 母线
cpf_tangent_angle_bus: 0
# 鼻点加密：|cosφ| 小于阈值后对两种角度参数化自动缩小步长
cpf_tangent_angle_refinement: true
cpf_tangent_angle_refinement_cos_threshold: 0.35
# 鼻点处局部步长不低于 cpf_max_step 的这一比例
cpf_tangent_angle_refinement_min_step_ratio: 0.02
# P–V 投影无法跨越相角型鼻点时，自动切换伪弧长继续跟踪
cpf_tangent_angle_pseudo_fallback: true
# 绝对 V/P 角参数化母线；供 cpf_parameterization: absolute_vp_angle 使用
# 角度定义为 α=atan2(V, P/P0)，0 表示自动选择电压最敏感的 PQ 母线
cpf_absolute_vp_angle_bus: 0
cpf_absolute_vp_angle_pseudo_fallback: true
# 设为 0 时自动选择鼻点最低电压母线
cpf_monitor_bus: 0
cpf_verbose: true
